<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questionnaire - QCM</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .qcm-container {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .question {
            font-weight: bold;
            color: #555;
            margin-bottom: 15px;
            font-size: 16px;
            line-height: 1.4;
        }
        .option {
            display: block;
            margin-bottom: 12px;
            cursor: pointer;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            transition: background-color 0.2s;
        }
        .option:hover {
            background-color: #f9f9f9;
        }
        .option input {
            margin-right: 10px;
        }
        button {
            width: 100%;
            background-color: #007BFF;
            color: white;
            border: none;
            padding: 15px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="qcm-container">
        <h2>Vérification de la tâche</h2>
        
        <form id="qcmForm">
            <p class="question">Quel est le tarif pour un séjour à New York pour une personne ? </p>

            <label class="option">
                <input type="radio" name="reponse" value="A" required> 
                A)  2,556 euros
            </label>
            
            <label class="option">
                <input type="radio" name="reponse" value="B"> 
                B)  4,554 euros
            </label>
            
            <label class="option">
                <input type="radio" name="reponse" value="C"> 
                C)  2,500 euros
            </label>
            
            <label class="option">
                <input type="radio" name="reponse" value="D"> 
                D)  1,500 euros
            </label>

            <button type="button" onclick="enregistrerQCM()">Valider ma réponse</button>

<script>
    function enregistrerQCM() {
        const form = document.getElementById('qcmForm');
        if (!form.reportValidity()) return;

        const reponse = document.querySelector('input[name="reponse"]:checked').value;
        sessionStorage.setItem('reponseQCM', reponse);

        window.location.href = 'formulaireCog.html';
    }
</script>
        </form>
    </div>

</body>
</html>
